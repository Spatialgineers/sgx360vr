<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGX ENGINE | Spatialgineers VR Sandbox</title>
    <style>
        :root {
            --sgx-yellow: #FDCC0D;
            --sgx-blue: #32527B;
            --sgx-copper: #B87333;
            --sgx-bg: #050505;
            --glass: rgba(20, 20, 20, 0.95);
        }
        body {
            margin: 0; padding: 0; background: var(--sgx-bg);
            color: #fff; font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header {
            background: #0a0a0a; border-bottom: 2px solid var(--sgx-yellow);
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;
        }
        .logo-container {
            display: flex; flex-direction: column;
        }
        h1 { margin: 0; font-size: 1.4rem; letter-spacing: 3px; color: var(--sgx-yellow); font-weight: 900; }
        span.subtitle { font-size: 0.7rem; color: var(--sgx-blue); letter-spacing: 1px; text-transform: uppercase; }
        
        .controls { display: flex; gap: 10px; }
        button {
            background: transparent; color: var(--sgx-yellow); border: 1px solid var(--sgx-yellow);
            padding: 8px 15px; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.2s; text-transform: uppercase;
        }
        button:hover { background: var(--sgx-yellow); color: #000; }
        button.action { background: var(--sgx-blue); border-color: var(--sgx-blue); color: #fff; }
        button.action:hover { background: #4a7ab5; border-color: #4a7ab5; }

        .workspace { display: flex; flex: 1; overflow: hidden; }
        .panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #222; }
        
        textarea {
            flex: 1; background: #080808; color: #00ffcc; border: none; padding: 15px;
            font-family: 'Courier New', Courier, monospace; font-size: 0.85rem; resize: none; outline: none;
            white-space: pre; overflow-wrap: normal; overflow-x: auto;
        }
        
        iframe { flex: 1; border: none; background: #000; width: 100%; height: 100%; }
        
        .label { 
            background: #111; padding: 8px 15px; font-size: 0.8rem; color: #aaa; 
            border-bottom: 1px solid #222; display: flex; justify-content: space-between;
        }
        .warning { color: var(--sgx-copper); font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <h1>⚙️ SPATIALGINEERS</h1>
            <span class="subtitle">SGX VR Sandbox Engine</span>
        </div>
        <div class="controls">
            <button id="btn-run">▶ Ejecutar</button>
            <button id="btn-inject" class="action">💉 Hacer VR-Ready</button>
            <button id="btn-export">💾 Exportar</button>
        </div>
    </header>

    <div class="workspace">
        <div class="panel">
            <div class="label">
                INPUT HTML (Three.js Raw)
                <span class="warning">⚠️ RULE: DOM UI disappears in WebXR. Use HTMLMesh for VR Menus.</span>
            </div>
            <textarea id="code-editor"></textarea>
        </div>
        <div class="panel">
            <div class="label">LIVE PREVIEW</div>
            <iframe id="preview-frame" allow="xr-spatial-tracking"></iframe>
        </div>
    </div>

    <script>
        const editor = document.getElementById('code-editor');
        const preview = document.getElementById('preview-frame');

        // PoC Base Code
        const defaultCode = `<!DOCTYPE html>
<html lang="es">
<head>
    <title>SGX Base Scene</title>
    <style>body { margin: 0; overflow: hidden; background: #050505; }</style>
    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                       "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
    <\/script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Core SGX Gear/Cube
        const geometry = new THREE.BoxGeometry();
        const material = new THREE.MeshBasicMaterial({ color: 0xFDCC0D, wireframe: true });
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            mesh.rotation.x += 0.01;
            mesh.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    <\/script>
</body>
</html>`;

        editor.value = defaultCode;

        function runCode() {
            preview.srcdoc = editor.value;
        }

        // SGX INJECTOR ENGINE
        function injectVR() {
            let code = editor.value;

            if (code.includes('VRButton.js')) return;

            // Import VR Button
            code = code.replace(
                /import\s+\*\s+as\s+THREE\s+from\s+['"]three['"];/,
                `import * as THREE from 'three';\n        import { VRButton } from 'three/addons/webxr/VRButton.js';`
            );

            // Setup Renderer for VR
            code = code.replace(
                /(renderer\.setSize\([^;]+;\s*)/,
                `$1\n        // --- SGX VR PIPELINE ---
        renderer.xr.enabled = true;
        const vrBtn = VRButton.createButton(renderer);
        vrBtn.style.background = '#FDCC0D';
        vrBtn.style.color = '#000';
        document.body.appendChild(vrBtn);
        
        // Locomotion Rig
        const cameraGroup = new THREE.Group();
        scene.add(cameraGroup);
        cameraGroup.add(camera);
        // ------------------------\n`
            );

            // Hijack requestAnimationFrame
            code = code.replace(/requestAnimationFrame\s*\(\s*([a-zA-Z0-9_]+)\s*\)\s*;/g, '// requestAnimationFrame bloqueado por SGX');
            
            code = code.replace(
                /(function\s+([a-zA-Z0-9_]+)\s*\(\)\s*\{[\s\S]*?renderer\.render\s*\(\s*scene\s*,\s*camera\s*\)\s*;[\s\S]*?\})\s*\2\s*\(\)\s*;/g,
                `$1\n        renderer.setAnimationLoop($2);`
            );

            editor.value = code;
            runCode();
        }

        function exportHTML() {
            const blob = new Blob([editor.value], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "SGX_VR_Build.html";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        document.getElementById('btn-run').addEventListener('click', runCode);
        document.getElementById('btn-inject').addEventListener('click', injectVR);
        document.getElementById('btn-export').addEventListener('click', exportHTML);

        runCode();
    </script>
</body>
</html>
